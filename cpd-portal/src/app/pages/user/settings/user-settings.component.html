<div class="settings-container">
  <div class="settings-header">
    <h1>Account Settings</h1>
    <p>Manage your profile information and account security.</p>
  </div>

  <div class="settings-grid">
    <!-- Profile Section -->
    <div class="settings-card card">
      <div class="card-header">
        <h3><i class="fas fa-user-circle"></i> Profile Information</h3>
      </div>
      <div class="card-body">
        <form (ngSubmit)="updateProfile()">
          <div class="form-row">
            <div class="form-group">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" name="first_name" [(ngModel)]="user.first_name" placeholder="Enter first name" />
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" name="last_name" [(ngModel)]="user.last_name" placeholder="Enter last name" />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" [(ngModel)]="user.email" placeholder="Enter email address" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="isUpdatingProfile">
              <i class="fas" [class.fa-save]="!isUpdatingProfile" [class.fa-spinner]="isUpdatingProfile" [class.fa-spin]="isUpdatingProfile"></i>
              {{ isUpdatingProfile ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Password Section -->
    <div class="settings-card card">
      <div class="card-header">
        <h3><i class="fas fa-lock"></i> Security</h3>
      </div>
      <div class="card-body">
        <form (ngSubmit)="updatePassword()">
          <div class="form-group">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" [(ngModel)]="passwordData.current_password" placeholder="••••••••" />
          </div>

          <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" [(ngModel)]="passwordData.new_password" placeholder="Min. 6 characters" />
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" [(ngModel)]="passwordData.confirm_password" placeholder="Repeat new password" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="isUpdatingPassword">
              <i class="fas" [class.fa-key]="!isUpdatingPassword" [class.fa-spinner]="isUpdatingPassword" [class.fa-spin]="isUpdatingPassword"></i>
              {{ isUpdatingPassword ? 'Updating...' : 'Update Password' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
